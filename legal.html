<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrunderBox - Legal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f1ea;--surface:#fffaf2;--surface2:#fffdf9;--border:rgba(30,24,16,.12);
  --text:#15120e;--muted:#6d6358;--secondary:#7a6f63;
  --green:#0f766e;--blue:#6d5efc;--amber:#ef6c57;--gray:#b7791f;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.backbar{padding:16px 24px 0}
.backbar a{color:var(--secondary);text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em}
.flowbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 24px 0}
.flowmeta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.flowpill{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;padding:5px 9px;border:1px solid var(--border);border-radius:999px;color:var(--secondary);background:var(--surface)}
.flowpill.active{color:var(--green);border-color:rgba(74,222,128,.28);background:rgba(74,222,128,.06)}
.flowstatus{font-size:11px;color:var(--secondary);font-family:'JetBrains Mono',monospace;letter-spacing:.06em}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.08em}
.logo span{color:var(--text)}
.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-track{width:160px;height:1px;background:var(--border)}
.prog-fill{height:100%;background:var(--green);transition:width .4s ease}
.prog-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

.main{display:flex;flex:1;overflow:hidden}
.rail{width:268px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:20px 12px}
.rail-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:0 8px;margin-bottom:12px}
.step-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:6px;cursor:pointer;transition:background .12s,opacity .12s;margin-bottom:2px}
.step-item:hover:not(.locked){background:var(--surface)}
.step-item.active{background:var(--surface2)}
.step-item.locked{opacity:.28;cursor:not-allowed}
.step-num{width:22px;height:22px;border-radius:50%;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;flex-shrink:0;color:var(--muted);transition:all .15s}
.step-item.active .step-num{border-color:var(--text);color:var(--text)}
.step-item.done .step-num{background:var(--green);border-color:var(--green);color:#000;font-size:10px}
.step-info{flex:1;min-width:0}
.step-name{font-size:12px;font-weight:500;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .12s}
.step-item.active .step-name,.step-item.done .step-name{color:var(--text)}
.step-tag{font-size:9px;font-family:'JetBrains Mono',monospace;padding:1px 5px;border-radius:2px;margin-top:3px;display:inline-block;letter-spacing:.04em}
.ta{background:rgba(74,222,128,.08);color:var(--green)}
.tm{background:rgba(96,165,250,.08);color:var(--blue)}
.tp{background:rgba(251,191,36,.08);color:var(--amber)}
.ti{background:rgba(107,114,128,.08);color:var(--gray)}
.pgroup{margin:4px 0;border-left:1px solid var(--border);padding-left:6px;margin-left:10px}
.pgroup-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.06em;padding:4px 8px 4px 8px;opacity:.6}

.content{flex:1;overflow-y:auto;padding:40px 52px}
.step-header{margin-bottom:28px}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;letter-spacing:.06em;display:inline-block;margin-bottom:10px}
.step-title{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.2}
.step-desc{font-size:13px;color:var(--secondary);line-height:1.65;max-width:540px;margin-top:6px}
.parallel-notice{display:inline-flex;align-items:center;gap:6px;background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.12);border-radius:4px;padding:5px 10px;font-size:10px;color:var(--blue);font-family:'JetBrains Mono',monospace;letter-spacing:.04em;margin-top:12px}

.locked-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:55%;text-align:center;gap:14px}
.locked-circle{width:44px;height:44px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}

.fg{margin-bottom:18px}
label{display:block;font-size:10px;color:var(--muted);margin-bottom:7px;letter-spacing:.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
input[type=text],input[type=number],textarea,select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:9px 12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .15s;resize:none}
input:focus,textarea:focus,select:focus{border-color:#383838}
select option{background:var(--surface)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rgroup{display:flex;flex-direction:column;gap:7px}
.roption{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:border-color .15s,background .15s}
.roption:hover{border-color:#383838;background:var(--surface)}
.roption.sel{border-color:var(--green);background:rgba(74,222,128,.04)}
.rdot{width:14px;height:14px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.roption.sel .rdot{border-color:var(--green);background:var(--green)}
.roption.sel .rdot::after{content:'';width:5px;height:5px;border-radius:50%;background:#000}
.rtext strong{display:block;font-size:12px;font-weight:500;margin-bottom:1px}
.rtext span{font-size:11px;color:var(--muted)}

.btn{padding:9px 18px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .1s;font-family:'Inter',sans-serif}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--text);color:#000}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-g{background:var(--green);color:#000}
.btn:hover{opacity:.82}
.actions{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}

.rbox{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:18px;margin-top:20px}
.rbox.ok{border-color:rgba(74,222,128,.2);background:rgba(74,222,128,.03)}
.rbox-label{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:10px;letter-spacing:.06em}
.infobox{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--gray);border-radius:5px;padding:12px 14px;font-size:12px;color:var(--secondary);line-height:1.65}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-top:20px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:14px;cursor:pointer;transition:border-color .15s,transform .12s}
.pcard:hover{border-color:#383838;transform:translateY(-1px)}
.pcard.sel{border-color:var(--blue);background:rgba(96,165,250,.04)}
.pname{font-size:13px;font-weight:600;margin-bottom:3px}
.pmeta{font-size:11px;color:var(--muted);line-height:1.5}
.ptag{display:inline-block;font-size:9px;padding:2px 5px;border-radius:2px;margin-top:8px;background:rgba(96,165,250,.08);color:var(--blue);font-family:'JetBrains Mono',monospace;letter-spacing:.04em}

.docpre{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:20px;margin-top:20px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.9;color:var(--secondary);max-height:260px;overflow-y:auto}
.hl{color:var(--green)}

.statrow{display:flex;gap:10px;margin-top:16px}
.stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:10px 14px}
.slabel{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.06em;margin-bottom:3px}
.sval{font-size:18px;font-weight:600}

.timeline{margin-top:24px}
.titem{display:flex;gap:14px;padding-bottom:20px;position:relative}
.titem:not(:last-child)::before{content:'';position:absolute;left:10px;top:22px;bottom:0;width:1px;background:var(--border)}
.tdot{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted)}
.tcontent strong{display:block;font-size:13px;font-weight:500;margin-bottom:2px}
.tcontent p{font-size:11px;color:var(--muted);line-height:1.5}

.rec{background:rgba(74,222,128,.04);border:1px solid rgba(74,222,128,.15);border-radius:7px;padding:18px;margin-top:20px}
.rec-type{font-size:22px;font-weight:700;color:var(--green);margin-bottom:6px}
.rec-row{display:flex;gap:8px;margin-bottom:3px;font-size:12px;color:var(--secondary)}
.rec-arrow{color:var(--green)}

.ptable{display:grid;grid-template-columns:180px 1fr;gap:6px 14px;line-height:1.9;font-size:12px}
.pk{color:var(--muted)}
.pv{color:var(--green)}
.pw{color:var(--amber)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.hidden{display:none}
</style>
</head>
<body>

<div class="backbar">
  <a href="./index.html">← Back to intake</a>
</div>

<div class="flowbar">
  <div class="flowmeta" id="moduleFlow"></div>
  <div class="flowstatus" id="moduleFlowStatus"></div>
</div>

<div class="topbar">
  <div class="logo">GRUNDERBOX / <span>LEGAL MODULE</span></div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <div class="prog-label" id="pl">0 / 9 complete</div>
  </div>
</div>

<div class="main">
  <div class="rail" id="rail"></div>
  <div class="content" id="content"></div>
</div>

<script>
const FLOW_KEY = 'founderPlatformFlow';
const FLOW_RESULT_KEY = 'founderPlatformFlowCompleted';
const FLOW_STATUS_KEY = 'founderPlatformFlowStatus';
const MODULE_ID = 'legal';
const MODULES = [
  { id: 'visa', name: 'Visa', file: 'visa.html' },
  { id: 'legal', name: 'Legal', file: 'legal.html' },
  { id: 'banking', name: 'Banking', file: 'banking.html' },
  { id: 'housing', name: 'Housing', file: 'housing.html' },
  { id: 'networking', name: 'Networking', file: 'networking.html' }
];

const STEPS = [
  { name:'Company Type',       tag:'ta', tagl:'RECOMMEND',      deps:[],    parallel:null, title:'Choose your company type',        desc:'Three questions. We tell you exactly which structure fits your situation — and why.' },
  { name:'Articles of Assoc.', tag:'ta', tagl:'AUTO-GENERATE',  deps:[0],   parallel:null, title:'Articles of association',         desc:'We generate your Gesellschaftsvertrag using the official Musterprotokoll, pre-filled with your details.' },
  { name:'Bank Account',       tag:'tm', tagl:'PROVIDER MATCH', deps:[1],   parallel:null, title:'Open a business bank account',   desc:'You must deposit share capital before the notary appointment. We surface banks that work for non-EU founders.' },
  { name:'Notary',             tag:'tm', tagl:'PROVIDER MATCH', deps:[1,2], parallel:4,    title:'Book a notary',                  desc:'Notarisation is mandatory in Germany. We match you with notaries experienced with foreign founders.' },
  { name:'Translator',         tag:'tm', tagl:'PROVIDER MATCH', deps:[1,2], parallel:3,    title:'Certified translator',           desc:'Non-EU founders need a sworn interpreter at the notary appointment. Book this alongside your notary.' },
  { name:'Handelsregister',    tag:'ti', tagl:'INFO',           deps:[3,4], parallel:null, title:'Commercial register',            desc:'Your notary handles this. Your company is legally born when it appears here. Nothing you need to do.' },
  { name:'Gewerbeanmeldung',   tag:'tp', tagl:'PRE-FILL',       deps:[5],   parallel:7,    title:'Trade registration',             desc:'Required for most commercial activity. We pre-fill your form from everything you\'ve already told us.' },
  { name:'Finanzamt',          tag:'tp', tagl:'PRE-FILL',       deps:[5],   parallel:6,    title:'Tax office registration',        desc:'30+ question form. We fill 28 of them. You review two fields and download — ready to submit.' },
  { name:'Tax Advisor',        tag:'tm', tagl:'PROVIDER MATCH', deps:[5],   parallel:null, title:'Connect with a Steuerberater',  desc:'German tax law has strict deadlines. We connect you with English-speaking advisors who work with startups.' }
];

const PARALLEL_PAIRS = [[3,4],[6,7]];
const renders = [renderCompanyType,renderArticles,renderBank,renderNotary,renderTranslator,renderHandelsregister,renderGewerbe,renderFinanzamt,renderSteuerberater];

let cur = 0;
const done = new Set();
const D = {};

function loadFlow() {
  try {
    const raw = localStorage.getItem(FLOW_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (error) {
    return null;
  }
}

function getFlowModules() {
  const flow = loadFlow();
  if (!flow || !Array.isArray(flow.modules) || flow.modules.length === 0) {
    return [MODULE_ID];
  }
  return flow.modules;
}

function renderModuleFlow() {
  const activeModules = getFlowModules();
  const currentIndex = activeModules.indexOf(MODULE_ID);
  document.getElementById('moduleFlow').innerHTML = activeModules.map((id) => {
    const meta = MODULES.find((module) => module.id === id) || { name: id };
    return `<span class="flowpill ${id === MODULE_ID ? 'active' : ''}">${meta.name}</span>`;
  }).join('');
  document.getElementById('moduleFlowStatus').textContent =
    currentIndex === -1 ? 'Standalone module' : `Module ${currentIndex + 1} / ${activeModules.length}`;
}

function updateModuleStatus(detail) {
  try {
    const raw = localStorage.getItem(FLOW_STATUS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!Array.isArray(data.modules)) return;
    data.modules = data.modules.map((module) =>
      module.id === MODULE_ID
        ? { ...module, status: 'completed', detail }
        : module
    );
    localStorage.setItem(FLOW_STATUS_KEY, JSON.stringify(data));
  } catch (error) {
  }
}

function completeFlowModule() {
  updateModuleStatus('Completed 9 legal setup steps including company type, incorporation documents, banking dependencies, notary coordination, and tax registration.');
  const flow = loadFlow();
  const modules = getFlowModules();
  const currentIndex = modules.indexOf(MODULE_ID);
  if (!flow || currentIndex === -1) {
    window.location.href = 'status.html';
    return;
  }
  const nextId = modules[currentIndex + 1];
  if (nextId) {
    const nextMeta = MODULES.find((module) => module.id === nextId);
    if (nextMeta) {
      window.location.href = nextMeta.file;
      return;
    }
  }
  localStorage.removeItem(FLOW_KEY);
  localStorage.setItem(FLOW_RESULT_KEY, JSON.stringify({ modules }));
  window.location.href = 'status.html';
}

function showModuleCompletion() {
  document.getElementById('content').innerHTML = `
    <div class="step-header">
      <span class="badge ta">MODULE COMPLETE</span>
      <div class="step-title">Legal onboarding completed</div>
      <div class="step-desc">The legal module has collected the core information needed for incorporation, registration, and downstream provider coordination.</div>
    </div>
    <div class="rbox ok">
      <div class="rbox-label">READY FOR NEXT MODULE</div>
      <div style="font-size:12px;color:var(--secondary);line-height:1.7">Continue the guided flow to the next selected module, or finish the process and view the final status page.</div>
    </div>
    <div class="actions">
      <button class="btn btn-g" onclick="completeFlowModule()">Continue flow →</button>
      <button class="btn btn-s" onclick="window.location.href='status.html'">View status</button>
    </div>`;
}

function isLocked(i){ return STEPS[i].deps.some(d => !done.has(d)); }

function init(){ renderModuleFlow(); renderRail(); renderStep(0); }

function renderRail(){
  const skip = new Set();
  let html = `<div class="rail-label" style="padding:0 8px;margin-bottom:12px">Your journey</div>`;
  for(let i=0;i<STEPS.length;i++){
    if(skip.has(i)) continue;
    const pair = PARALLEL_PAIRS.find(p=>p[0]===i);
    if(pair){
      html += `<div class="pgroup"><div class="pgroup-label">⇄ do simultaneously</div>${pair.map(j=>{skip.add(j);return stepItem(j);}).join('')}</div>`;
    } else {
      html += stepItem(i);
    }
  }
  document.getElementById('rail').innerHTML = html;
  const pct = (done.size/STEPS.length)*100;
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pl').textContent = `${done.size} / ${STEPS.length} complete`;
}

function stepItem(i){
  const s=STEPS[i], locked=isLocked(i);
  return `<div class="step-item ${i===cur?'active':''} ${done.has(i)?'done':''} ${locked?'locked':''}" onclick="go(${i})">
    <div class="step-num">${done.has(i)?'✓':(i+1)}</div>
    <div class="step-info">
      <div class="step-name">${s.name}</div>
      <span class="step-tag ${s.tag}">${s.tagl}</span>
    </div>
  </div>`;
}

function go(i){
  cur=i;
  renderRail();
  if(isLocked(i)){ showLocked(i); return; }
  renderStep(i);
  document.getElementById('content').scrollTop=0;
}

function advance(){
  done.add(cur);
  if(done.size===STEPS.length){
    renderRail();
    showModuleCompletion();
    document.getElementById('content').scrollTop=0;
    return;
  }
  let next=cur+1;
  while(next<STEPS.length && isLocked(next)) next++;
  if(next<STEPS.length) cur=next;
  renderRail();
  if(isLocked(cur)) showLocked(cur); else renderStep(cur);
  document.getElementById('content').scrollTop=0;
}

function showLocked(i){
  const blockers = STEPS[i].deps.filter(d=>!done.has(d));
  const names = blockers.map(d=>`"${STEPS[d].name}"`);
  const msg = names.length===1 ? names[0] : names.slice(0,-1).join(', ')+' and '+names.slice(-1);
  const goTo = blockers[0];
  document.getElementById('content').innerHTML=`
    <div class="locked-screen">
      <div class="locked-circle">○</div>
      <div style="font-size:16px;font-weight:600">Step locked</div>
      <div style="font-size:13px;color:var(--secondary);max-width:300px;line-height:1.6">Complete ${msg} first to unlock this step.</div>
      <button class="btn btn-s" style="margin-top:4px" onclick="go(${goTo})">Go to ${STEPS[goTo].name} →</button>
    </div>`;
}

function renderStep(i){
  const s=STEPS[i];
  const pn = s.parallel!==null
    ? `<div class="parallel-notice">⇄ &nbsp;Book this alongside "${STEPS[s.parallel].name}"</div>`
    : '';
  document.getElementById('content').innerHTML=`
    <div class="step-header">
      <span class="badge ${s.tag}">${s.tagl}</span>
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
      ${pn}
    </div>
    <div id="body"></div>`;
  renders[i](document.getElementById('body'));
}

function renderCompanyType(el){
  el.innerHTML=`
    <div class="fg"><label>How much capital can you invest upfront?</label>
      <div class="rgroup">
        <div class="roption" onclick="pick(this,'capital','low')"><div class="rdot"></div><div class="rtext"><strong>Under EUR 25,000</strong><span>Bootstrapping or starting lean</span></div></div>
        <div class="roption" onclick="pick(this,'capital','high')"><div class="rdot"></div><div class="rtext"><strong>EUR 25,000 or more</strong><span>Ready to put in full GmbH capital</span></div></div>
      </div>
    </div>
    <div class="fg"><label>Do you plan to raise from investors?</label>
      <div class="rgroup">
        <div class="roption" onclick="pick(this,'investors','yes')"><div class="rdot"></div><div class="rtext"><strong>Yes</strong><span>VC, angels, or institutional</span></div></div>
        <div class="roption" onclick="pick(this,'investors','no')"><div class="rdot"></div><div class="rtext"><strong>No</strong><span>Bootstrapped or revenue-funded</span></div></div>
      </div>
    </div>
    <div class="fg"><label>Solo founder or co-founders?</label>
      <div class="rgroup">
        <div class="roption" onclick="pick(this,'solo','yes')"><div class="rdot"></div><div class="rtext"><strong>Solo</strong><span>Just me</span></div></div>
        <div class="roption" onclick="pick(this,'solo','no')"><div class="rdot"></div><div class="rtext"><strong>Co-founders</strong><span>Two or more founders</span></div></div>
      </div>
    </div>
    <div id="typeResult" class="hidden"></div>`;
}

function pick(el,k,v){
  el.parentElement.querySelectorAll('.roption').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  D[k]=v;
  if(D.capital&&D.investors&&D.solo) genType();
}

function genType(){
  if(!D.capital||!D.investors||!D.solo) return;
  let type,reasons;
  if(D.investors==='yes'||D.capital==='high'){
    type='GmbH';
    reasons=['Investors expect this structure','EUR 25,000 capital signals commitment','More credible with banks and enterprise clients','Standard for venture-backed companies'];
  } else {
    type='UG (haftungsbeschrankt)';
    reasons=['Start with as little as EUR 1','Same liability protection as GmbH','Can convert to GmbH later when profitable','Fastest and cheapest formation process'];
  }
  D.companyType=type;
  document.getElementById('typeResult').innerHTML=`
    <div class="rec">
      <div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-bottom:6px;letter-spacing:.06em">RECOMMENDATION</div>
      <div class="rec-type">${type}</div>
      ${reasons.map(r=>`<div class="rec-row"><span class="rec-arrow">→</span><span>${r}</span></div>`).join('')}
    </div>
    <div class="actions">

function genArticles(){

  D.companyName=n;D.shareCapital=c;D.businessPurpose=p;D.companyAddress=a;
  const t=D.companyType||'UG (haftungsbeschrankt)';
  const sfx=t==='GmbH'?'GmbH':'UG (haftungsbeschrankt)';
  document.getElementById('artResult').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;margin-bottom:10px">
      <div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.06em">GENERATED - GESELLSCHAFTSVERTRAG</div>
      <button class="btn btn-s" style="font-size:11px;padding:5px 10px" onclick="alert('Downloading PDF...')">↓ Download PDF</button>
    </div>
    <div class="docpre">
§ 1 &nbsp;Firma und Sitz<br>
Die Gesellschaft führt die Firma <span class="hl">${n} ${sfx}</span>.<br>
Der Sitz der Gesellschaft ist <span class="hl">${a}</span>.<br><br>
§ 2 &nbsp;Gegenstand des Unternehmens<br>
Gegenstand des Unternehmens ist: <span class="hl">${p}</span>.<br><br>
§ 3 &nbsp;Stammkapital<br>
Das Stammkapital beträgt <span class="hl">EUR ${parseFloat(c).toLocaleString('de-DE')}</span>.<br>
Die Einlage ist vollständig in bar zu erbringen.<br><br>
§ 4 &nbsp;Geschäftsführung<br>
Die Gesellschaft hat einen oder mehrere Geschäftsführer.<br>
Ist nur ein Geschäftsführer bestellt, vertritt er die Gesellschaft allein.<br><br>
§ 5 &nbsp;Gesellschafterbeschlüsse<br>
Gesellschafterbeschlüsse werden in Versammlungen oder schriftlich gefasst.<br><br>
§ 6 &nbsp;Jahresabschluss<br>
Der Geschäftsführer stellt den Jahresabschluss innerhalb von drei Monaten<br>
nach Ende des Geschäftsjahres auf.<br><br>
<span style="color:var(--muted)">- Musterprotokoll (§ 2 Abs. 1a GmbHG) - ready for notary -</span>

    <div class="actions"><button class="btn btn-g" onclick="advance()">Confirm & continue →</button></div>`;
  document.getElementById('artResult').classList.remove('hidden');
}

function selProv(el,prefix){
  el.parentElement.querySelectorAll('.pcard').forEach(c=>c.classList.remove('sel'));

  const conf=document.getElementById(prefix+'Conf');
  conf.innerHTML=`<div class="actions"><button class="btn btn-g" onclick="book('${prefix}')">Request appointment →</button></div>`;
  conf.classList.remove('hidden');
}

function book(prefix){
  document.getElementById(prefix+'Conf').innerHTML=`

}
